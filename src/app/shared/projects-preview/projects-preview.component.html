            <section class="projects-section" id="projects">
                <div class="container">
                    <h2 class="section-title">What I've Built</h2>
                    <p class="section-subtitle">Projects that I enjoyed working on.</p>

                    <div class="projects-grid">
                        <!-- Dynamic projects mapped from Spring Boot API -->
                        <div class="project-card" *ngFor="let project of projects" [routerLink]="['/projects', project.id]" style="cursor: pointer;">
                            <div class="project-image" style="padding: 0;">
                                <img [src]="project.imageUrl" [alt]="project.title" style="width:100%;height:100%;object-fit:cover;border-radius: 12px 12px 0 0;" />
                            </div>
                            <div class="project-header" style="padding-top: 24px;">
                                <h3 class="project-title">{{ project.title }}</h3>
                            </div>
                            <p class="project-description">
                                {{ project.description }}
                            </p>
                            <div class="tech-tags">
                                <span class="tech-tag" *ngFor="let tech of project.techStackArray?.slice(0, 4)">{{ tech }}</span>
                                <span class="tech-tag count" *ngIf="project.techStackArray && project.techStackArray.length > 4">+{{ project.techStackArray.length - 4 }}</span>
                            </div>
                            <button class="view-details-btn" style="margin-top: 14px;">View Details ></button>
                        </div>
                    </div>

                    <div class="projects-footer">
                        <a routerLink="/projects" class="browse-all-btn">Browse all projects →</a>
                    </div>
                </div>
            </section>
