<nav class="nav" [class.affix]="isAffix">
  <div class="container">
    
    <!-- Logo -->
    <div class="logo">
      <a routerLink="/" (click)="closeMenu()">
        <span class="logo-first">{{ firstName }}</span>
        <span class="logo-last"> {{ lastName }}</span>
        <span class="logo-dot">.</span>
      </a>
    </div>

    <!-- Desktop Nav Elements (Links + Icons) -->
    <div class="desktop-nav" [class.show-mobile]="menuOpen">
      <!-- Links -->
      <ul class="nav-links">
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Home</a></li>
        <li><a (click)="scrollTo('projects')">Projects</a></li>
        <li><a (click)="scrollTo('skills')">Skills</a></li>
        <li><a (click)="scrollTo('contact')">Contact</a></li>
      </ul>

      <!-- Icons -->
      <div class="nav-icons">
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle Theme" (click)="toggleTheme()">
          <!-- Sun icon (shown in dark mode) -->
          <svg *ngIf="isDarkMode" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sun-icon">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <!-- Moon icon (shown in light mode) -->
          <svg *ngIf="!isDarkMode" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="moon-icon">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <button class="icon-btn" aria-label="Toggle Language">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="globe-icon">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="2" y1="12" x2="22" y2="12"></line>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile Hamburger -->
    <span class="navTrigger" [class.active]="menuOpen" (click)="toggleMenu()">
      <i></i>
      <i></i>
      <i></i>
    </span>

  </div>
</nav>
