            <section class="who-i-am" id="about">
                <div class="container">
                    <h2 class="section-title">Who I Am</h2>
                    <p class="section-subtitle">My story and background.</p>
                    <!-- Overview Card -->
                    <div class="overview-card scroll-animate">
                        <div class="overview-header">
                            <svg class="overview-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            <span class="overview-title">Overview</span>
                        </div>
                        <p class="overview-text" *ngIf="profile">
                            {{ profile.bio }}
                        </p>
                        <div *ngIf="!profile && loading" class="spinner" style="margin: 20px auto; width: 24px; height: 24px;"></div>
                    </div>

                    <div class="macos-wrapper scroll-animate">
                        <div class="macos-window">
                            <div class="window-header">
                                <div class="window-controls">
                                    <span class="control red"></span>
                                    <span class="control yellow"></span>
                                    <span class="control green"></span>
                                </div>
                                <div class="window-title">Who I Am</div>
                            </div>
                            <!-- Editor Tabs -->
                            <div class="editor-tabs">
                                <div class="tab" [class.active]="activeTab === 'technical'" (click)="setTab('technical')" style="cursor: pointer;">
                                    <img src="assets/images/folder-filled.png" alt="Technical" class="tab-icon-img">
                                    Technical
                                </div>
                                <div class="tab" [class.active]="activeTab === 'personal'" (click)="setTab('personal')" style="cursor: pointer;">
                                    <img src="assets/images/folder-outline.png" alt="Personal" class="tab-icon-img">
                                    Personal
                                </div>
                            </div>
                            <div class="window-content">
                                <div class="window-body">
                                    <div class="loading-overlay" *ngIf="loading" style="padding: 2rem; color: #888;">
                                        Loading sections...
                                    </div>
                                    <!-- Sidebar (Left) -->
                                    <div class="sidebar" *ngIf="!loading">
                                        <!-- Technical Folder Files -->
                                        <div class="file-list-container active" *ngIf="activeTab === 'technical'">
                                            <div class="file-item" 
                                                 *ngFor="let sec of technicalSections"
                                                 [ngClass]="{'active': activeSection?.id === sec.id}"
                                                 (click)="setActiveSection(sec)"
                                                 style="cursor: pointer;">
                                                <img src="assets/images/file-icon.png" class="file-icon-img" alt="File">
                                                <span class="file-name">{{ sec.name }}.txt</span>
                                            </div>
                                            <div *ngIf="technicalSections.length === 0" style="padding: 10px; color: #666; font-size: 0.85rem;">
                                                Empty folder
                                            </div>
                                        </div>

                                        <!-- Personal Folder Files -->
                                        <div class="file-list-container active" *ngIf="activeTab === 'personal'">
                                            <div class="file-item" 
                                                 *ngFor="let sec of personalSections"
                                                 [ngClass]="{'active': activeSection?.id === sec.id}"
                                                 (click)="setActiveSection(sec)"
                                                 style="cursor: pointer;">
                                                <img src="assets/images/file-icon.png" class="file-icon-img" alt="File">
                                                <span class="file-name">{{ sec.name }}.txt</span>
                                            </div>
                                            <div *ngIf="personalSections.length === 0" style="padding: 10px; color: #666; font-size: 0.85rem;">
                                                Empty folder
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Main View (Right) -->
                                    <div class="main-view" *ngIf="!loading">
                                        <div class="file-content active" *ngIf="activeSection">
                                            <h3 class="file-heading" [style.color]="activeTab === 'technical' ? '#4facfe' : '#a252fa'">
                                                {{ activeTab === 'technical' ? '⚡ ' : '🌱 ' }}{{ activeSection.name }}
                                            </h3>
                                            <div class="file-text" [innerHTML]="activeSection.content" style="white-space: pre-wrap;"></div>
                                        </div>
                                        <div class="file-content active" *ngIf="!activeSection" style="display: flex; align-items: center; justify-content: center; height: 100%; color: #666;">
                                            Select a file to view its contents.
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
